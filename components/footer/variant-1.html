<!-- ============================================================
  Section     : Footer
  Variant     : 1
  Layout      : 4-column: logo+tagline | quick links | quick links | contact info
  Placeholders: {{COMPANY_NAME}}, {{FOOTER_TAGLINE}},
                {{FOOTER_LINK_1}} ~ {{FOOTER_LINK_4}},
                {{CONTACT_EMAIL}}, {{CONTACT_PHONE}}, {{COPYRIGHT}}
============================================================ -->
<footer class="bg-base-200 pt-14 pb-6">
  <div class="container mx-auto max-w-6xl px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-10">
      <!-- Col 1: Logo + tagline -->
      <div>
        <a href="#" class="text-xl font-bold text-primary block mb-3">{{COMPANY_NAME}}</a>
        <p class="text-base-content/60 text-sm leading-relaxed">{{FOOTER_TAGLINE}}</p>
      </div>
      <!-- Col 2: Quick links -->
      <div>
        <h4 class="font-bold text-sm uppercase tracking-widest mb-4">Navigation</h4>
        <ul class="space-y-2 text-sm text-base-content/70">
          <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_1}}</a></li>
          <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_2}}</a></li>
        </ul>
      </div>
      <!-- Col 3: More links -->
      <div>
        <h4 class="font-bold text-sm uppercase tracking-widest mb-4">More</h4>
        <ul class="space-y-2 text-sm text-base-content/70">
          <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_3}}</a></li>
          <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_4}}</a></li>
        </ul>
      </div>
      <!-- Col 4: Contact -->
      <div>
        <h4 class="font-bold text-sm uppercase tracking-widest mb-4">Contact</h4>
        <ul class="space-y-2 text-sm text-base-content/70">
          <li><a href="mailto:{{CONTACT_EMAIL}}" class="hover:text-primary transition-colors">{{CONTACT_EMAIL}}</a></li>
          <li><a href="tel:{{CONTACT_PHONE}}" class="hover:text-primary transition-colors">{{CONTACT_PHONE}}</a></li>
        </ul>
      </div>
    </div>
    <div class="border-t border-base-300 pt-6 text-center text-xs text-base-content/40">
      {{COPYRIGHT}}
    </div>
  </div>
</footer>
