<!-- ============================================================
  Section     : Footer
  Variant     : 3
  Layout      : Center-aligned — logo center + link row + copyright
  Placeholders: {{COMPANY_NAME}}, {{FOOTER_TAGLINE}},
                {{FOOTER_LINK_1}} ~ {{FOOTER_LINK_4}}, {{COPYRIGHT}}
============================================================ -->
<footer class="bg-base-200 py-12">
  <div class="container mx-auto max-w-4xl px-4 text-center">
    <a href="#" class="text-2xl font-bold text-primary block mb-2">{{COMPANY_NAME}}</a>
    <p class="text-base-content/50 text-sm mb-6">{{FOOTER_TAGLINE}}</p>
    <nav class="mb-8">
      <ul class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm text-base-content/70">
        <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_1}}</a></li>
        <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_2}}</a></li>
        <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_3}}</a></li>
        <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_4}}</a></li>
      </ul>
    </nav>
    <div class="border-t border-base-300 pt-6 text-xs text-base-content/40">
      {{COPYRIGHT}}
    </div>
  </div>
</footer>
