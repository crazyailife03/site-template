<!-- ============================================================
  Section     : Footer
  Variant     : 6
  Layout      : Full primary-color footer — 2-column: logo+tagline | links+contact
  Placeholders: {{COMPANY_NAME}}, {{FOOTER_TAGLINE}},
                {{FOOTER_LINK_1}} ~ {{FOOTER_LINK_4}},
                {{CONTACT_EMAIL}}, {{CONTACT_PHONE}}, {{COPYRIGHT}}
============================================================ -->
<footer class="bg-primary text-primary-content pt-14 pb-6">
  <div class="container mx-auto max-w-6xl px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 mb-10">
      <!-- Col 1: Brand -->
      <div class="lg:col-span-1">
        <a href="#" class="text-2xl font-bold text-primary-content block mb-3">{{COMPANY_NAME}}</a>
        <p class="text-primary-content/70 text-sm leading-relaxed">{{FOOTER_TAGLINE}}</p>
      </div>
      <!-- Col 2: Links -->
      <div>
        <h4 class="font-bold text-xs uppercase tracking-widest text-primary-content/50 mb-4">Navigation</h4>
        <ul class="space-y-2 text-sm">
          <li><a href="#" class="text-primary-content/80 hover:text-primary-content transition-colors">{{FOOTER_LINK_1}}</a></li>
          <li><a href="#" class="text-primary-content/80 hover:text-primary-content transition-colors">{{FOOTER_LINK_2}}</a></li>
          <li><a href="#" class="text-primary-content/80 hover:text-primary-content transition-colors">{{FOOTER_LINK_3}}</a></li>
          <li><a href="#" class="text-primary-content/80 hover:text-primary-content transition-colors">{{FOOTER_LINK_4}}</a></li>
        </ul>
      </div>
      <!-- Col 3: Contact -->
      <div>
        <h4 class="font-bold text-xs uppercase tracking-widest text-primary-content/50 mb-4">Contact</h4>
        <ul class="space-y-2 text-sm">
          <li><a href="mailto:{{CONTACT_EMAIL}}" class="text-primary-content/80 hover:text-primary-content transition-colors">{{CONTACT_EMAIL}}</a></li>
          <li><a href="tel:{{CONTACT_PHONE}}" class="text-primary-content/80 hover:text-primary-content transition-colors">{{CONTACT_PHONE}}</a></li>
        </ul>
      </div>
    </div>
    <div class="border-t border-primary-content/20 pt-6 text-center text-xs text-primary-content/40">
      {{COPYRIGHT}}
    </div>
  </div>
</footer>
