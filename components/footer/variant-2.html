<!-- ============================================================
  Section     : Footer
  Variant     : 2
  Layout      : Minimal 2-column: logo left + quick links right
  Placeholders: {{COMPANY_NAME}}, {{FOOTER_TAGLINE}},
                {{FOOTER_LINK_1}} ~ {{FOOTER_LINK_4}}, {{COPYRIGHT}}
============================================================ -->
<footer class="bg-base-100 border-t border-base-200 py-10">
  <div class="container mx-auto max-w-6xl px-4">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-8">
      <!-- Logo + tagline -->
      <div>
        <a href="#" class="text-xl font-bold text-primary block mb-1">{{COMPANY_NAME}}</a>
        <p class="text-base-content/50 text-sm">{{FOOTER_TAGLINE}}</p>
      </div>
      <!-- Nav links -->
      <nav>
        <ul class="flex flex-wrap gap-x-6 gap-y-2 text-sm text-base-content/70">
          <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_1}}</a></li>
          <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_2}}</a></li>
          <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_3}}</a></li>
          <li><a href="#" class="hover:text-primary transition-colors">{{FOOTER_LINK_4}}</a></li>
        </ul>
      </nav>
    </div>
    <div class="border-t border-base-200 pt-6 text-center text-xs text-base-content/40">
      {{COPYRIGHT}}
    </div>
  </div>
</footer>
