<!-- ============================================================
  Section     : Footer
  Variant     : 5
  Layout      : Dark full-width + 3-column: brand | links | contact+address
  Placeholders: {{COMPANY_NAME}}, {{FOOTER_TAGLINE}},
                {{FOOTER_LINK_1}} ~ {{FOOTER_LINK_4}},
                {{CONTACT_EMAIL}}, {{CONTACT_PHONE}}, {{CONTACT_ADDRESS}},
                {{COPYRIGHT}}
============================================================ -->
<footer class="bg-neutral text-neutral-content pt-14 pb-6">
  <div class="container mx-auto max-w-6xl px-4">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-10 mb-10">
      <!-- Col 1: Brand -->
      <div>
        <a href="#" class="text-xl font-bold text-primary block mb-3">{{COMPANY_NAME}}</a>
        <p class="text-neutral-content/60 text-sm leading-relaxed">{{FOOTER_TAGLINE}}</p>
      </div>
      <!-- Col 2: Links -->
      <div>
        <h4 class="font-bold text-sm uppercase tracking-widest text-neutral-content/50 mb-4">Links</h4>
        <ul class="space-y-2 text-sm">
          <li><a href="#" class="text-neutral-content/70 hover:text-neutral-content transition-colors">{{FOOTER_LINK_1}}</a></li>
          <li><a href="#" class="text-neutral-content/70 hover:text-neutral-content transition-colors">{{FOOTER_LINK_2}}</a></li>
          <li><a href="#" class="text-neutral-content/70 hover:text-neutral-content transition-colors">{{FOOTER_LINK_3}}</a></li>
          <li><a href="#" class="text-neutral-content/70 hover:text-neutral-content transition-colors">{{FOOTER_LINK_4}}</a></li>
        </ul>
      </div>
      <!-- Col 3: Contact -->
      <div>
        <h4 class="font-bold text-sm uppercase tracking-widest text-neutral-content/50 mb-4">Contact</h4>
        <ul class="space-y-2 text-sm text-neutral-content/70">
          <li><a href="mailto:{{CONTACT_EMAIL}}" class="hover:text-neutral-content transition-colors">{{CONTACT_EMAIL}}</a></li>
          <li><a href="tel:{{CONTACT_PHONE}}" class="hover:text-neutral-content transition-colors">{{CONTACT_PHONE}}</a></li>
          <li>{{CONTACT_ADDRESS}}</li>
        </ul>
      </div>
    </div>
    <div class="border-t border-neutral-content/10 pt-6 text-center text-xs text-neutral-content/30">
      {{COPYRIGHT}}
    </div>
  </div>
</footer>
