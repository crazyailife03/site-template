<!-- ============================================================
  Section     : Stats
  Variant     : 2
  Layout      : Dark background, oversized numbers, 4-column grid
  Placeholders: {{STATS_TITLE}}, {{STATS_SUBTITLE}},
                {{STAT_1_NUMBER}}, {{STAT_1_LABEL}},
                {{STAT_2_NUMBER}}, {{STAT_2_LABEL}},
                {{STAT_3_NUMBER}}, {{STAT_3_LABEL}},
                {{STAT_4_NUMBER}}, {{STAT_4_LABEL}}
============================================================ -->
<section id="stats" class="bg-neutral py-16 md:py-20 relative overflow-hidden">
  <!-- Grid line texture -->
  <div class="absolute inset-0 opacity-[0.03]" style="background-image:linear-gradient(to right,currentColor 1px,transparent 1px),linear-gradient(to bottom,currentColor 1px,transparent 1px);background-size:48px 48px" aria-hidden="true"></div>
  <!-- Corner plus marks -->
  <div class="absolute top-6 left-8 text-neutral-content/12 font-light select-none pointer-events-none text-4xl leading-none">+</div>
  <div class="absolute top-6 right-8 text-neutral-content/12 font-light select-none pointer-events-none text-4xl leading-none">+</div>
  <div class="absolute bottom-6 left-8 text-neutral-content/8 font-light select-none pointer-events-none text-4xl leading-none">+</div>
  <div class="absolute bottom-6 right-8 text-neutral-content/8 font-light select-none pointer-events-none text-4xl leading-none">+</div>
  <div class="container mx-auto max-w-5xl px-4 text-center relative z-10">
    <p class="text-neutral-content/50 font-semibold text-sm uppercase tracking-widest mb-2">{{STATS_SUBTITLE}}</p>
    <h2 class="text-2xl md:text-3xl font-bold text-neutral-content mb-12">{{STATS_TITLE}}</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
      <div>
        <p class="text-5xl md:text-6xl font-black text-primary leading-none mb-2">{{STAT_1_NUMBER}}</p>
        <p class="text-neutral-content/60 text-sm uppercase tracking-wide">{{STAT_1_LABEL}}</p>
      </div>
      <div>
        <p class="text-5xl md:text-6xl font-black text-primary leading-none mb-2">{{STAT_2_NUMBER}}</p>
        <p class="text-neutral-content/60 text-sm uppercase tracking-wide">{{STAT_2_LABEL}}</p>
      </div>
      <div>
        <p class="text-5xl md:text-6xl font-black text-primary leading-none mb-2">{{STAT_3_NUMBER}}</p>
        <p class="text-neutral-content/60 text-sm uppercase tracking-wide">{{STAT_3_LABEL}}</p>
      </div>
      <div>
        <p class="text-5xl md:text-6xl font-black text-primary leading-none mb-2">{{STAT_4_NUMBER}}</p>
        <p class="text-neutral-content/60 text-sm uppercase tracking-wide">{{STAT_4_LABEL}}</p>
      </div>
    </div>
  </div>
</section>
