<!-- ============================================================
  Section     : CTA Banner
  Variant     : 1
  Layout      : Full-width primary background, title + text + button centered
  Placeholders: {{CTA_BANNER_TITLE}}, {{CTA_BANNER_TEXT}}, {{CTA_BANNER_BUTTON}}
============================================================ -->
<section id="cta-banner" class="bg-primary py-16 md:py-20 relative overflow-hidden">
  <!-- Diagonal stripe texture -->
  <div class="absolute inset-0 opacity-[0.04]" style="background-image:repeating-linear-gradient(45deg,currentColor,currentColor 1px,transparent 1px,transparent 14px)" aria-hidden="true"></div>
  <!-- Geometric ring left -->
  <div class="absolute -left-16 top-1/2 -translate-y-1/2 w-64 h-64 rounded-full border-2 border-primary-content/12 pointer-events-none"></div>
  <div class="absolute -left-8 top-1/2 -translate-y-1/2 w-40 h-40 rounded-full border border-primary-content/8 pointer-events-none"></div>
  <!-- Geometric ring right -->
  <div class="absolute -right-16 top-1/2 -translate-y-1/2 w-64 h-64 rounded-full border-2 border-primary-content/12 pointer-events-none"></div>
  <div class="container mx-auto max-w-3xl px-4 text-center relative z-10">
    <h2 class="text-3xl md:text-4xl font-bold text-primary-content mb-4">{{CTA_BANNER_TITLE}}</h2>
    <p class="text-primary-content/70 text-lg mb-8 max-w-xl mx-auto">{{CTA_BANNER_TEXT}}</p>
    <a href="#contact" class="btn bg-primary-content text-primary hover:bg-primary-content/90 btn-lg border-0 px-10">{{CTA_BANNER_BUTTON}}</a>
  </div>
</section>
