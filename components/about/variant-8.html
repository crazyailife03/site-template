<!-- ============================================================
  Section     : About
  Variant     : 8
  Layout      : Centered card — top banner image + content below
  Placeholders: {{ABOUT_TITLE}}, {{ABOUT_SUBTITLE}}, {{ABOUT_TEXT}},
                {{ABOUT_CTA}}, {{ABOUT_IMAGE}}
============================================================ -->
<section id="about" class="bg-base-200 py-16 md:py-24">
  <div class="container mx-auto max-w-4xl px-4">
    <div class="bg-base-100 border border-base-300 rounded-3xl shadow-sm overflow-hidden">
      <!-- Top banner image -->
      <div class="w-full h-56 md:h-72 overflow-hidden">
        <img src="{{ABOUT_IMAGE}}" alt="{{ABOUT_TITLE}}" class="w-full h-full object-cover">
      </div>
      <!-- Content -->
      <div class="px-8 py-10 md:px-16 md:py-12 text-center relative overflow-hidden">
        <!-- Decorative corner accent -->
        <div class="absolute bottom-0 right-0 w-24 h-24 bg-secondary/6 rounded-tl-full pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-16 h-16 bg-primary/5 rounded-tr-full pointer-events-none"></div>
        <!-- Content -->
        <div class="relative z-10">
          <span class="badge badge-primary badge-outline mb-6 px-4 py-2 text-xs uppercase tracking-widest font-semibold">{{ABOUT_SUBTITLE}}</span>
          <h2 class="text-3xl md:text-4xl lg:text-5xl font-bold leading-tight mb-6">{{ABOUT_TITLE}}</h2>
          <div class="w-12 h-1 bg-primary rounded mx-auto mb-6"></div>
          <p class="text-base-content/60 text-lg leading-relaxed mb-10 max-w-2xl mx-auto">{{ABOUT_TEXT}}</p>
          <a href="#contact" class="btn btn-primary btn-lg px-10">{{ABOUT_CTA}}</a>
        </div>
      </div>
    </div>
  </div>
</section>
