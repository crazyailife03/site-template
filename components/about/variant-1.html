<!-- ============================================================
  Section     : About
  Variant     : 1
  Layout      : Text left + image right, two-column
  Placeholders: {{ABOUT_TITLE}}, {{ABOUT_SUBTITLE}}, {{ABOUT_TEXT}},
                {{ABOUT_CTA}}, {{ABOUT_IMAGE}}
============================================================ -->
<section class="bg-base-100 py-16 md:py-24">
  <div class="container mx-auto max-w-6xl px-4">
    <div class="flex flex-col md:flex-row items-center gap-10 md:gap-16">
      <!-- Text -->
      <div class="flex-1 text-center md:text-left">
        <p class="text-primary font-semibold text-sm uppercase tracking-widest mb-2">{{ABOUT_SUBTITLE}}</p>
        <h2 class="text-3xl md:text-4xl font-bold mb-5">{{ABOUT_TITLE}}</h2>
        <p class="text-base-content/60 leading-relaxed mb-8">{{ABOUT_TEXT}}</p>
        <a href="#contact" class="btn btn-primary">{{ABOUT_CTA}}</a>
      </div>
      <!-- Image -->
      <div class="flex-1 w-full">
        <img src="{{ABOUT_IMAGE}}" alt="{{ABOUT_TITLE}}" class="w-full h-auto rounded-2xl shadow-xl object-cover aspect-square md:aspect-[4/3]">
      </div>
    </div>
  </div>
</section>
