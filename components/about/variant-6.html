<!-- ============================================================
  Section     : About
  Variant     : 6
  Layout      : Split columns — primary-color left panel + text right, no image
  Placeholders: {{ABOUT_TITLE}}, {{ABOUT_SUBTITLE}}, {{ABOUT_TEXT}}, {{ABOUT_CTA}}
============================================================ -->
<section id="about" class="bg-base-100">
  <div class="flex flex-col lg:flex-row min-h-[480px]">
    <!-- Left: primary color panel -->
    <div class="lg:w-5/12 bg-primary text-primary-content flex items-center justify-center py-16 md:py-24 px-8 md:px-14 relative overflow-hidden">
      <!-- Decorative rings -->
      <div class="absolute -top-20 -right-20 w-64 h-64 rounded-full border-2 border-primary-content/10 pointer-events-none"></div>
      <div class="absolute -bottom-10 -left-10 w-44 h-44 rounded-full border border-primary-content/8 pointer-events-none"></div>
      <!-- Small dot accent -->
      <div class="absolute bottom-16 right-12 w-3 h-3 rounded-full bg-primary-content/15 pointer-events-none"></div>
      <div class="absolute top-16 left-10 w-2 h-2 rounded-full bg-primary-content/20 pointer-events-none"></div>
      <div class="max-w-xs text-center lg:text-left relative z-10">
        <p class="text-primary-content/60 font-semibold text-sm uppercase tracking-widest mb-4">{{ABOUT_SUBTITLE}}</p>
        <h2 class="text-3xl md:text-4xl font-black leading-tight mb-8">{{ABOUT_TITLE}}</h2>
        <a href="#contact" class="btn btn-neutral btn-lg">{{ABOUT_CTA}}</a>
      </div>
    </div>
    <!-- Right: text content -->
    <div class="lg:w-7/12 bg-base-100 flex items-center py-16 md:py-24 px-8 md:px-14 lg:px-20">
      <div class="max-w-lg">
        <div class="w-10 h-1 bg-primary rounded mb-6"></div>
        <p class="text-base-content/70 text-lg leading-relaxed">{{ABOUT_TEXT}}</p>
      </div>
    </div>
  </div>
</section>
