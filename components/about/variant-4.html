<!-- ============================================================
  Section     : About
  Variant     : 4
  Layout      : Large banner image on top + text below (magazine layout)
  Placeholders: {{ABOUT_TITLE}}, {{ABOUT_SUBTITLE}}, {{ABOUT_TEXT}},
                {{ABOUT_CTA}}, {{ABOUT_IMAGE}}
============================================================ -->
<section class="bg-base-100 py-16 md:py-24">
  <div class="container mx-auto max-w-5xl px-4">
    <!-- Banner image -->
    <div class="mb-10 md:mb-14">
      <img src="{{ABOUT_IMAGE}}" alt="{{ABOUT_TITLE}}" class="w-full rounded-2xl shadow-xl object-cover aspect-[16/6]">
    </div>
    <!-- Text content -->
    <div class="flex flex-col md:flex-row gap-10 items-start">
      <div class="md:w-1/3 shrink-0">
        <p class="text-primary font-semibold text-sm uppercase tracking-widest mb-2">{{ABOUT_SUBTITLE}}</p>
        <h2 class="text-3xl md:text-4xl font-bold leading-tight">{{ABOUT_TITLE}}</h2>
      </div>
      <div class="flex-1">
        <p class="text-base-content/60 leading-relaxed text-lg mb-8">{{ABOUT_TEXT}}</p>
        <a href="#contact" class="btn btn-primary">{{ABOUT_CTA}}</a>
      </div>
    </div>
  </div>
</section>
