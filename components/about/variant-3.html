<!-- ============================================================
  Section     : About
  Variant     : 3
  Layout      : Dark split — manifesto text left + image right
  Placeholders: {{ABOUT_TITLE}}, {{ABOUT_SUBTITLE}}, {{ABOUT_TEXT}},
                {{ABOUT_CTA}}, {{ABOUT_IMAGE}}
============================================================ -->
<section id="about" class="bg-neutral relative overflow-hidden">
  <!-- Oversized decorative quote mark -->
  <div class="absolute -top-8 left-4 md:left-12 text-neutral-content/[0.04] font-black select-none pointer-events-none leading-none" style="font-size:18rem;line-height:0.75">"</div>
  <!-- Ring decoration -->
  <div class="absolute -bottom-16 left-1/3 w-72 h-72 rounded-full border border-neutral-content/6 pointer-events-none"></div>
  <div class="flex flex-col lg:flex-row min-h-[560px]">
    <!-- Left: dark manifesto text -->
    <div class="flex-1 flex items-center py-20 md:py-28 px-8 md:px-16 relative z-10">
      <div class="max-w-lg">
        <p class="text-neutral-content/50 font-semibold text-sm uppercase tracking-widest mb-4">{{ABOUT_SUBTITLE}}</p>
        <h2 class="text-4xl md:text-5xl lg:text-6xl font-black leading-tight text-neutral-content mb-8">{{ABOUT_TITLE}}</h2>
        <div class="w-10 h-1 bg-primary rounded mb-8"></div>
        <p class="text-neutral-content/70 text-xl leading-relaxed mb-10 font-light">{{ABOUT_TEXT}}</p>
        <a href="#contact" class="btn btn-outline border-neutral-content text-neutral-content hover:bg-neutral-content hover:text-neutral btn-lg">{{ABOUT_CTA}}</a>
      </div>
    </div>
    <!-- Right: image -->
    <div class="lg:w-[45%] min-h-[45vw] lg:min-h-0">
      <img src="{{ABOUT_IMAGE}}" alt="{{ABOUT_TITLE}}" class="w-full h-full object-cover">
    </div>
  </div>
</section>
