<!-- ============================================================
  Section     : Hero
  Variant     : 6
  Layout      : Gradient orb background + split (text left, image right)
  Placeholders: {{HERO_TITLE}}, {{HERO_SUBTITLE}}, {{HERO_DESCRIPTION}},
                {{CTA_PRIMARY}}, {{CTA_SECONDARY}}, {{HERO_IMAGE}}
============================================================ -->
<section id="hero" class="bg-base-200 relative overflow-hidden min-h-[80vh] flex items-center">
  <!-- Decorative gradient orbs -->
  <div class="absolute top-0 left-0 w-[32rem] h-[32rem] bg-primary/15 rounded-full blur-3xl -translate-y-1/2 -translate-x-1/3 pointer-events-none"></div>
  <div class="absolute bottom-0 left-1/4 w-80 h-80 bg-secondary/12 rounded-full blur-3xl translate-y-1/3 pointer-events-none"></div>
  <div class="absolute top-1/3 right-0 w-64 h-64 bg-accent/8 rounded-full blur-2xl translate-x-1/3 pointer-events-none"></div>
  <!-- Content -->
  <div class="container mx-auto max-w-6xl px-4 py-16 relative z-10">
    <div class="flex flex-col lg:flex-row items-center gap-12 lg:gap-16">
      <!-- Left: Text -->
      <div class="flex-1 text-center lg:text-left">
        <div class="badge badge-primary badge-lg mb-6 px-5 py-3 tracking-widest text-xs uppercase font-semibold">{{HERO_SUBTITLE}}</div>
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-black leading-tight mb-6">{{HERO_TITLE}}</h1>
        <p class="text-base-content/60 text-lg md:text-xl mb-10 max-w-xl font-light leading-relaxed">{{HERO_DESCRIPTION}}</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
          <a href="#contact" class="btn btn-primary btn-lg px-10">{{CTA_PRIMARY}}</a>
          <a href="#about" class="btn btn-outline btn-lg px-10">{{CTA_SECONDARY}}</a>
        </div>
      </div>
      <!-- Right: Image -->
      <div class="flex-1 w-full lg:max-w-lg">
        <div class="rounded-2xl overflow-hidden shadow-2xl ring-1 ring-base-content/10">
          <img src="{{HERO_IMAGE}}" alt="{{HERO_TITLE}}" class="w-full h-[45vh] object-cover">
        </div>
      </div>
    </div>
  </div>
</section>
