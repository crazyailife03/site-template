<!-- ============================================================
  Section     : Hero
  Variant     : 6
  Layout      : Gradient orb background, badge subtitle, centered text — NO image
  Placeholders: {{HERO_TITLE}}, {{HERO_SUBTITLE}}, {{HERO_DESCRIPTION}},
                {{CTA_PRIMARY}}, {{CTA_SECONDARY}}
  Note        : No image required — visual interest via gradient orbs
============================================================ -->
<section id="hero" class="bg-base-200 relative overflow-hidden min-h-[75vh] flex items-center">
  <!-- Decorative gradient orbs -->
  <div class="absolute top-0 right-0 w-[32rem] h-[32rem] bg-primary/15 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-80 h-80 bg-secondary/12 rounded-full blur-3xl translate-y-1/3 -translate-x-1/4 pointer-events-none"></div>
  <div class="absolute top-1/2 left-1/2 w-64 h-64 bg-accent/8 rounded-full blur-2xl -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
  <!-- Content -->
  <div class="container mx-auto max-w-5xl px-4 text-center py-24 relative z-10">
    <div class="badge badge-primary badge-lg mb-6 px-5 py-3 tracking-widest text-xs uppercase font-semibold">{{HERO_SUBTITLE}}</div>
    <h1 class="text-5xl md:text-6xl lg:text-7xl font-black leading-tight mb-6">{{HERO_TITLE}}</h1>
    <p class="text-base-content/60 text-xl md:text-2xl mb-10 max-w-2xl mx-auto font-light leading-relaxed">{{HERO_DESCRIPTION}}</p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="#contact" class="btn btn-primary btn-lg px-10">{{CTA_PRIMARY}}</a>
      <a href="#about" class="btn btn-outline btn-lg px-10">{{CTA_SECONDARY}}</a>
    </div>
  </div>
</section>
