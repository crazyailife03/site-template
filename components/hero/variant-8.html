<!-- ============================================================
  Section     : Hero
  Variant     : 8
  Layout      : 50/50 split — primary color panel (left) + image panel (right)
  Placeholders: {{HERO_TITLE}}, {{HERO_SUBTITLE}}, {{HERO_DESCRIPTION}},
                {{CTA_PRIMARY}}, {{CTA_SECONDARY}}, {{HERO_IMAGE}}
============================================================ -->
<section id="hero" class="min-h-[80vh] flex flex-col lg:flex-row overflow-hidden">
  <!-- Left: Primary color panel -->
  <div class="bg-primary text-primary-content flex-1 flex items-center relative overflow-hidden">
    <!-- Decorative large numeral -->
    <div class="absolute right-0 top-0 font-black select-none pointer-events-none leading-none text-primary-content/5" style="font-size:18rem">01</div>
    <!-- Decorative circle -->
    <div class="absolute -bottom-16 -left-16 w-64 h-64 rounded-full border-2 border-primary-content/10 pointer-events-none"></div>
    <!-- Content -->
    <div class="relative z-10 px-10 py-16 lg:py-20 lg:pl-16 lg:pr-10 max-w-xl">
      <p class="text-primary-content/60 font-semibold text-sm uppercase tracking-widest mb-5">{{HERO_SUBTITLE}}</p>
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-black leading-tight mb-6">{{HERO_TITLE}}</h1>
      <p class="text-primary-content/80 text-lg md:text-xl mb-10 font-light leading-relaxed">{{HERO_DESCRIPTION}}</p>
      <div class="flex flex-col sm:flex-row gap-4">
        <a href="#contact" class="btn btn-neutral btn-lg">{{CTA_PRIMARY}}</a>
        <a href="#about" class="btn btn-outline border-primary-content text-primary-content hover:bg-primary-content hover:text-primary btn-lg">{{CTA_SECONDARY}}</a>
      </div>
    </div>
  </div>
  <!-- Right: Image panel -->
  <div class="lg:w-[45%] min-h-[45vw] lg:min-h-0">
    <img src="{{HERO_IMAGE}}" alt="{{HERO_TITLE}}" class="w-full h-full object-cover">
  </div>
</section>
