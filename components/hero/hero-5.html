<section class="w-full bg-[var(--bg-main)] pt-16 pb-0 overflow-hidden">
  <div class="max-w-7xl mx-auto px-6 text-center space-y-8">
    <h1 class="text-5xl font-extrabold tracking-tight" style="color: var(--text-main);">
      {{hero_title}}
    </h1>
    <div class="max-w-2xl mx-auto flex p-1 rounded-2xl bg-[var(--bg-paper)] border border-[var(--border)]">
        <button class="flex-1 py-2 rounded-xl bg-[var(--bg-main)] shadow-sm font-bold" style="color: var(--primary);">個人版</button>
        <button class="flex-1 py-2 font-medium" style="color: var(--text-muted);">企業版</button>
    </div>
    <div class="relative mt-12">
        <div class="mx-auto max-w-5xl rounded-t-3xl border-t border-x border-[var(--border)] bg-[var(--bg-paper)] p-4 shadow-2xl">
            <div class="rounded-t-xl bg-[var(--bg-main)] h-[300px] flex items-center justify-center border border-[var(--border)]">
                <span style="color: var(--text-muted);">Dashboard Preview</span>
            </div>
        </div>
    </div>
  </div>
</section>
