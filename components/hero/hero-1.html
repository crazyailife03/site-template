<section class="w-full py-20 bg-[var(--bg-main)]">
  <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
    <div class="space-y-8">
      <h1 class="text-5xl lg:text-6xl font-extrabold leading-tight" style="color: var(--text-main);">
        {{hero_title}}
      </h1>
      <p class="text-xl leading-relaxed" style="color: var(--text-muted);">
        {{hero_description}}
      </p>
      <div class="flex space-x-4">
        <button class="btn-primary text-lg px-8 py-4">立即開始</button>
        <button class="btn-outline text-lg px-8 py-4">瞭解更多</button>
      </div>
    </div>
    <div class="relative">
      <div class="w-full h-[400px] rounded-2xl shadow-2xl overflow-hidden bg-[var(--bg-paper)] border border-[var(--border)]">
        <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover opacity-80" />
      </div>
    </div>
  </div>
</section>
