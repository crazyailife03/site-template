<!-- ============================================================
  Section     : Hero
  Variant     : 5
  Layout      : Split screen — dark text panel left + full-height image right
  Placeholders: {{HERO_TITLE}}, {{HERO_SUBTITLE}}, {{HERO_DESCRIPTION}},
                {{CTA_PRIMARY}}, {{CTA_SECONDARY}}, {{HERO_IMAGE}}
============================================================ -->
<section id="hero" class="flex flex-col md:flex-row min-h-[80vh] md:min-h-screen">
  <!-- Left: Dark text panel -->
  <div class="flex-1 bg-neutral flex items-center justify-center py-16 md:py-0 px-8 md:px-16 relative overflow-hidden">
    <!-- Concentric ring decorations -->
    <div class="absolute -top-24 -right-24 w-72 h-72 rounded-full border border-neutral-content/6 pointer-events-none"></div>
    <div class="absolute -top-12 -right-12 w-48 h-48 rounded-full border border-neutral-content/8 pointer-events-none"></div>
    <div class="absolute -bottom-20 -left-20 w-64 h-64 rounded-full border border-neutral-content/5 pointer-events-none"></div>
    <!-- Plus marks -->
    <div class="absolute bottom-10 right-10 text-neutral-content/10 font-light select-none pointer-events-none text-4xl leading-none">+</div>
    <div class="absolute top-12 left-8 text-neutral-content/6 font-light select-none pointer-events-none text-2xl leading-none">+</div>
    <div class="max-w-lg text-center md:text-left relative z-10">
      <p class="text-neutral-content/60 font-semibold text-sm uppercase tracking-widest mb-4">{{HERO_SUBTITLE}}</p>
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold leading-tight text-neutral-content mb-6">{{HERO_TITLE}}</h1>
      <p class="text-neutral-content/70 text-lg mb-8">{{HERO_DESCRIPTION}}</p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center md:justify-start">
        <a href="#contact" class="btn btn-primary btn-lg">{{CTA_PRIMARY}}</a>
        <a href="#about" class="btn btn-outline border-neutral-content text-neutral-content hover:bg-neutral-content hover:text-neutral btn-lg">{{CTA_SECONDARY}}</a>
      </div>
    </div>
  </div>
  <!-- Right: Full-height image -->
  <div class="flex-1 min-h-64 md:min-h-0">
    <img src="{{HERO_IMAGE}}" alt="{{HERO_TITLE}}" class="w-full h-full object-cover">
  </div>
</section>
