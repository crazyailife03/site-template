<!-- ============================================================
  Section     : Hero
  Variant     : 1
  Layout      : Text left + image right, 50/50 two-column
  Placeholders: {{HERO_TITLE}}, {{HERO_SUBTITLE}}, {{HERO_DESCRIPTION}},
                {{CTA_PRIMARY}}, {{CTA_SECONDARY}}, {{HERO_IMAGE}}
============================================================ -->
<section id="hero" class="bg-base-100 py-16 md:py-24 relative overflow-hidden">
  <!-- Dot grid texture -->
  <div class="absolute inset-0 opacity-[0.035]" style="background-image:radial-gradient(circle,currentColor 1px,transparent 1px);background-size:24px 24px" aria-hidden="true"></div>
  <!-- Gradient orb -->
  <div class="absolute -top-24 -left-24 w-[28rem] h-[28rem] bg-primary/8 rounded-full blur-3xl pointer-events-none"></div>
  <!-- Bottom-right accent circle -->
  <div class="absolute -bottom-16 -right-16 w-64 h-64 rounded-full border border-base-content/5 pointer-events-none"></div>
  <div class="container mx-auto max-w-6xl px-4 relative z-10">
    <div class="flex flex-col-reverse md:flex-row items-center gap-10 md:gap-16">
      <!-- Text -->
      <div class="flex-1 text-center md:text-left">
        <p class="text-primary font-semibold text-sm uppercase tracking-widest mb-3">{{HERO_SUBTITLE}}</p>
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold leading-tight mb-5">{{HERO_TITLE}}</h1>
        <p class="text-base-content/60 text-lg mb-8 max-w-lg mx-auto md:mx-0">{{HERO_DESCRIPTION}}</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center md:justify-start">
          <a href="#contact" class="btn btn-primary btn-lg">{{CTA_PRIMARY}}</a>
          <a href="#about" class="btn btn-ghost btn-lg">{{CTA_SECONDARY}}</a>
        </div>
      </div>
      <!-- Image -->
      <div class="flex-1 w-full">
        <img src="{{HERO_IMAGE}}" alt="{{HERO_TITLE}}" class="w-full h-auto rounded-2xl shadow-2xl object-cover aspect-video">
      </div>
    </div>
  </div>
</section>
