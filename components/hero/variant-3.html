<!-- ============================================================
  Section     : Hero
  Variant     : 3
  Layout      : Oversized headline centered + showcase image below
  Placeholders: {{HERO_TITLE}}, {{HERO_SUBTITLE}}, {{HERO_DESCRIPTION}},
                {{CTA_PRIMARY}}, {{CTA_SECONDARY}}, {{HERO_IMAGE}}
============================================================ -->
<section id="hero" class="bg-base-200 py-20 md:py-28 relative overflow-hidden">
  <!-- Corner L-bracket accents -->
  <div class="absolute top-8 left-8 w-12 h-12 border-l-2 border-t-2 border-primary/25 pointer-events-none"></div>
  <div class="absolute top-8 right-8 w-12 h-12 border-r-2 border-t-2 border-primary/25 pointer-events-none"></div>
  <div class="absolute bottom-8 left-8 w-12 h-12 border-l-2 border-b-2 border-primary/25 pointer-events-none"></div>
  <div class="absolute bottom-8 right-8 w-12 h-12 border-r-2 border-b-2 border-primary/25 pointer-events-none"></div>
  <!-- Center glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[50vw] h-[50vw] max-w-2xl max-h-2xl bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
  <div class="container mx-auto max-w-5xl px-4 relative z-10">
    <!-- Text content -->
    <div class="text-center mb-14">
      <p class="text-primary font-semibold text-sm uppercase tracking-widest mb-4">{{HERO_SUBTITLE}}</p>
      <h1 class="text-5xl md:text-7xl lg:text-8xl font-black leading-none tracking-tight mb-6">{{HERO_TITLE}}</h1>
      <p class="text-base-content/60 text-xl md:text-2xl mb-10 max-w-2xl mx-auto font-light">{{HERO_DESCRIPTION}}</p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="#contact" class="btn btn-primary btn-lg px-10">{{CTA_PRIMARY}}</a>
        <a href="#about" class="btn btn-outline btn-lg px-10">{{CTA_SECONDARY}}</a>
      </div>
    </div>
    <!-- Showcase image -->
    <div class="rounded-2xl overflow-hidden shadow-2xl ring-1 ring-base-content/10">
      <img src="{{HERO_IMAGE}}" alt="{{HERO_TITLE}}" class="w-full h-[40vh] md:h-[55vh] object-cover">
    </div>
  </div>
</section>
