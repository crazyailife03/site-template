<section class="w-full py-32 bg-[var(--bg-main)] text-center border-b border-[var(--border)]">
  <div class="max-w-4xl mx-auto px-6 space-y-10">
    <span class="px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase" style="background-color: var(--bg-paper); color: var(--primary); border: 1px solid var(--border);">
      New Version 2.0
    </span>
    <h1 class="text-6xl lg:text-8xl font-black tracking-tighter" style="color: var(--text-main);">
      {{hero_title}}
    </h1>
    <p class="text-2xl font-light max-w-2xl mx-auto" style="color: var(--text-muted);">
      {{hero_description}}
    </p>
    <div class="pt-6">
      <button class="btn-primary rounded-full px-12 py-5 text-xl shadow-xl hover:scale-105 transition-transform">
        Start Building
      </button>
    </div>
  </div>
</section>
