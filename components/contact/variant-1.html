<!-- ============================================================
  Section     : Contact
  Variant     : 1
  Layout      : Contact info left + form right
  Placeholders: {{CONTACT_TITLE}}, {{CONTACT_SUBTITLE}},
                {{CONTACT_EMAIL}}, {{CONTACT_PHONE}}, {{CONTACT_ADDRESS}}
============================================================ -->
<section id="contact" class="bg-base-100 py-16 md:py-24">
  <div class="container mx-auto max-w-6xl px-4">
    <div class="flex flex-col md:flex-row gap-12 md:gap-16">
      <!-- Left: info -->
      <div class="md:w-2/5 shrink-0">
        <p class="text-primary font-semibold text-sm uppercase tracking-widest mb-2">{{CONTACT_SUBTITLE}}</p>
        <h2 class="text-3xl md:text-4xl font-bold mb-6">{{CONTACT_TITLE}}</h2>
        <ul class="space-y-5">
          <li class="flex items-start gap-4">
            <span class="text-primary text-xl mt-0.5"><i class="fa-solid fa-envelope"></i></span>
            <div>
              <p class="text-xs text-base-content/50 uppercase tracking-widest mb-0.5">Email</p>
              <a href="mailto:{{CONTACT_EMAIL}}" class="font-medium hover:text-primary transition-colors">{{CONTACT_EMAIL}}</a>
            </div>
          </li>
          <li class="flex items-start gap-4">
            <span class="text-primary text-xl mt-0.5"><i class="fa-solid fa-phone"></i></span>
            <div>
              <p class="text-xs text-base-content/50 uppercase tracking-widest mb-0.5">Phone</p>
              <a href="tel:{{CONTACT_PHONE}}" class="font-medium hover:text-primary transition-colors">{{CONTACT_PHONE}}</a>
            </div>
          </li>
          <li class="flex items-start gap-4">
            <span class="text-primary text-xl mt-0.5"><i class="fa-solid fa-location-dot"></i></span>
            <div>
              <p class="text-xs text-base-content/50 uppercase tracking-widest mb-0.5">Address</p>
              <p class="font-medium">{{CONTACT_ADDRESS}}</p>
            </div>
          </li>
        </ul>
      </div>
      <!-- Right: form -->
      <div class="flex-1">
        <form class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="form-control">
              <label class="label"><span class="label-text">Name</span></label>
              <input type="text" placeholder="Your name" class="input input-bordered w-full">
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text">Email</span></label>
              <input type="email" placeholder="your@email.com" class="input input-bordered w-full">
            </div>
          </div>
          <div class="form-control">
            <label class="label"><span class="label-text">Subject</span></label>
            <input type="text" placeholder="How can we help?" class="input input-bordered w-full">
          </div>
          <div class="form-control">
            <label class="label"><span class="label-text">Message</span></label>
            <textarea class="textarea textarea-bordered h-32 w-full" placeholder="Tell us more..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-full sm:w-auto px-10">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>
