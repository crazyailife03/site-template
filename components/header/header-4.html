<header class="w-full px-8 py-8 flex justify-between items-center bg-[var(--bg-main)]">
  <div class="text-xl font-black uppercase italic text-[var(--text-main)]">{{logo_text}}</div>
  <div class="flex items-center space-x-6">
    <a href="mailto:{{email}}" class="hidden sm:block text-sm font-medium border-b-2 border-[var(--primary)] text-[var(--text-main)]">Work with us</a>
    <button class="p-2 space-y-1.5">
      <div class="w-8 h-0.5 bg-[var(--text-main)]"></div>
      <div class="w-8 h-0.5 bg-[var(--text-main)]"></div>
      <div class="w-5 h-0.5 bg-[var(--primary)] ml-auto"></div>
    </button>
  </div>
</header>
