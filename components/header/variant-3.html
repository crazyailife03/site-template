<!-- ============================================================
  Section     : Header
  Variant     : 3
  Layout      : Transparent overlay on Hero, solid on scroll
  Placeholders: {{COMPANY_NAME}}, {{NAV_1}}~{{NAV_5}}, {{HEADER_CTA}}
  Note        : data-header="transparent" triggers script.js scroll handler
============================================================ -->
<header data-header="transparent" class="bg-transparent text-white fixed top-0 left-0 right-0 z-50">
  <div class="navbar container mx-auto max-w-6xl px-4">
    <div class="navbar-start">
      <a href="#" class="text-xl font-bold">{{COMPANY_NAME}}</a>
    </div>
    <nav class="navbar-center hidden lg:flex">
      <ul class="menu menu-horizontal gap-1 text-sm font-medium">
        <li><a href="{{NAV_1_HREF}}" class="hover:text-white/70 transition-colors">{{NAV_1}}</a></li>
        <li><a href="{{NAV_2_HREF}}" class="hover:text-white/70 transition-colors">{{NAV_2}}</a></li>
        <li><a href="{{NAV_3_HREF}}" class="hover:text-white/70 transition-colors">{{NAV_3}}</a></li>
        <li><a href="{{NAV_4_HREF}}" class="hover:text-white/70 transition-colors">{{NAV_4}}</a></li>
        <li><a href="{{NAV_5_HREF}}" class="hover:text-white/70 transition-colors">{{NAV_5}}</a></li>
      </ul>
    </nav>
    <div class="navbar-end gap-2">
      <a href="#contact" class="btn btn-outline btn-sm border-white text-white hidden lg:flex hover:bg-white hover:text-base-content">{{HEADER_CTA}}</a>
      <button class="btn btn-ghost btn-square lg:hidden" onclick="toggleMobileMenu()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>
  <!-- Mobile dropdown (always solid background) -->
  <div id="mobile-menu" class="hidden lg:hidden bg-base-100 text-base-content">
    <ul class="menu p-4 gap-1">
      <li><a href="{{NAV_1_HREF}}">{{NAV_1}}</a></li>
      <li><a href="{{NAV_2_HREF}}">{{NAV_2}}</a></li>
      <li><a href="{{NAV_3_HREF}}">{{NAV_3}}</a></li>
      <li><a href="{{NAV_4_HREF}}">{{NAV_4}}</a></li>
      <li><a href="{{NAV_5_HREF}}">{{NAV_5}}</a></li>
    </ul>
    <div class="px-4 pb-4">
      <a href="#contact" class="btn btn-primary btn-sm w-full">{{HEADER_CTA}}</a>
    </div>
  </div>
</header>
