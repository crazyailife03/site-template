<header class="w-full">
  <div class="bg-[var(--primary)] text-[var(--bg-paper)] py-2 text-center text-xs font-medium">
    Limited Time Offer: Free shipping on all orders over $50!
  </div>
  <div class="bg-[var(--bg-paper)] border-b border-[var(--border)] py-4 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="text-2xl font-extrabold tracking-tight text-[var(--primary)]">{{logo_text}}</div>
      <div class="flex space-x-4">
        <input type="text" placeholder="Search..." class="hidden lg:block px-4 py-1 rounded-full border border-[var(--border)] bg-[var(--bg-main)] text-sm focus:outline-none focus:ring-1 focus:ring-[var(--primary)]">
        <div class="flex items-center space-x-4 text-[var(--text-main)]">
          <button class="hover:text-[var(--primary)]">Login</button>
          <button class="relative p-2 rounded-full bg-[var(--bg-main)]">
            <span class="absolute top-0 right-0 w-2 h-2 bg-[var(--secondary)] rounded-full"></span>
            🛒
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
