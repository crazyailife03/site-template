<header class="w-full bg-[var(--bg-main)] px-8 py-10 flex justify-between items-end">
  <div class="flex flex-col">
    <span class="text-xs font-bold tracking-widest uppercase mb-1" style="color: var(--text-muted);">Portfolio</span>
    <div class="text-4xl font-light tracking-tighter" style="color: var(--text-main);">{{logo_text}}</div>
  </div>

  <div class="flex flex-col items-end space-y-4">
    <button class="group space-y-2 p-2">
      <div class="w-10 h-0.5 transition-all group-hover:w-6" style="background-color: var(--text-main);"></div>
      <div class="w-10 h-0.5" style="background-color: var(--text-main);"></div>
      <div class="w-6 h-0.5 transition-all group-hover:w-10" style="background-color: var(--primary);"></div>
    </button>
    <div class="hidden sm:block text-[10px] uppercase tracking-widest font-bold" style="color: var(--text-muted);">Menu</div>
  </div>
</header>
