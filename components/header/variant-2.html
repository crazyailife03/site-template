<!-- ============================================================
  Section     : Header
  Variant     : 2
  Layout      : Logo center + nav row below (two-row)
  Placeholders: {{COMPANY_NAME}}, {{NAV_1}}~{{NAV_5}}, {{HEADER_CTA}}
============================================================ -->
<header class="bg-base-100 shadow-sm sticky top-0 z-50">
  <!-- Row 1: Logo centered -->
  <div class="relative flex justify-center items-center py-4 border-b border-base-200">
    <a href="#" class="text-2xl font-bold text-primary tracking-wide">{{COMPANY_NAME}}</a>
    <button class="btn btn-ghost btn-square absolute right-4 lg:hidden" onclick="toggleMobileMenu()">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>
  <!-- Row 2: Nav + CTA (desktop only) -->
  <nav class="hidden lg:flex justify-center items-center gap-8 py-2">
    <a href="#" class="text-sm font-medium hover:text-primary transition-colors">{{NAV_1}}</a>
    <a href="#" class="text-sm font-medium hover:text-primary transition-colors">{{NAV_2}}</a>
    <a href="#" class="text-sm font-medium hover:text-primary transition-colors">{{NAV_3}}</a>
    <a href="#" class="text-sm font-medium hover:text-primary transition-colors">{{NAV_4}}</a>
    <a href="#" class="text-sm font-medium hover:text-primary transition-colors">{{NAV_5}}</a>
    <a href="#contact" class="btn btn-primary btn-xs ml-4">{{HEADER_CTA}}</a>
  </nav>
  <!-- Mobile dropdown -->
  <div id="mobile-menu" class="hidden lg:hidden border-t border-base-200">
    <ul class="menu p-4 gap-1">
      <li><a href="#">{{NAV_1}}</a></li>
      <li><a href="#">{{NAV_2}}</a></li>
      <li><a href="#">{{NAV_3}}</a></li>
      <li><a href="#">{{NAV_4}}</a></li>
      <li><a href="#">{{NAV_5}}</a></li>
    </ul>
    <div class="px-4 pb-4">
      <a href="#contact" class="btn btn-primary btn-sm w-full">{{HEADER_CTA}}</a>
    </div>
  </div>
</header>
